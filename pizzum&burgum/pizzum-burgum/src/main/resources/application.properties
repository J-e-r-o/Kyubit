spring.application.name=pizzum-burgum

# Configuración del Servidor
server.port=8080

# Configuración de la Base de Datos (PostgreSQL)
spring.datasource.url=jdbc:postgresql://localhost:5432/pizzum&burgum_db
spring.datasource.username=tu_usuario
spring.datasource.password=tu_contraseńa
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuración de JPA y Hibernate
# La propiedad 'ddl-auto=update' es ideal para desarrollo.
# Hibernate intentará actualizar el esquema de la base de datos según tus entidades.
# No uses 'create' en producción, ya que borraría todos los datos al reiniciar.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
